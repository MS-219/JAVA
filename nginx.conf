user root;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log logs/error.log info;


events {
    worker_connections 1024;
}



http {

    proxy_buffer_size 512k;
    proxy_buffers 32 512k;
    proxy_busy_buffers_size 512k;

    client_header_buffer_size 512k;
    large_client_header_buffers 4 512k;

    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format res '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for" "$request_filename"';


    sendfile on;
    client_max_body_size 200M;
    keepalive_timeout 35 30;
    client_body_temp_path /home/newpark/server/middleware/nginx/client_body_temp 1 2;

    gzip on;
    gzip_types text/plain application/x-javascript text/css text/javascript application/xml application/json;

    fastcgi_intercept_errors on;

    server_tokens off;

    upstream gateway {
        server 10.10.245.252:8081;
        server 10.10.245.252:8082;
    }

    upstream newparkposapi {
        server 10.10.245.252:8503;
    }

    upstream newparkposofflineapi {
        server 10.10.245.252:8505;
    }

    upstream newparkplatformapi {
        server 10.10.245.252:8507;
    }

    upstream newpark-provider {
        server 10.10.245.252:9546;
    }

    upstream newpark-manager {
        server 10.10.245.252:9556;
    }
	
    upstream newpark-job-admin {
        server 10.10.245.252:9559;
    }
	
    upstream newpark-merchant {
        server 10.10.245.252:9560;
    }

    #缴费平台merchant独立部署
    upstream newpark-merchant-payment {
        server 10.10.245.252:9564;
    }

    upstream newpark-portal {
        server 10.10.245.252:9558;
    }

    #缴费平台portal独立部署
    upstream newpark-portal-payment {
        server 10.10.245.252:9565;
    }

    upstream newpark-merchant-portal {
        server 10.10.245.252:9541;
    }

    upstream newpark-pos {
        server 10.10.245.252:9552;
    }

    upstream newpark-unified {
        server 10.10.245.252:9555;
    }

    upstream newpark-unified-portal {
        server 10.10.245.252:9562;
    }

    upstream newpark-report {
        server 10.10.245.252:9563;
    }

    upstream newpark-payment {
        server 10.10.245.252:9600;
    }

#    server {
#        listen 10085 default_server;
#        listen 10088 default_server;
#        listen 9024 default_server;
#        server_name _;
#		
#        return 403;
#    }


    server {
        listen 10085 ssl;
#        server_name 10.10.245.252;
         server_name  newpark.jnwfzx.com;
        gzip on;
        #如果前端打包已经压缩（带有.gz文件），则优先加载对应的.gz静态文件
        gzip_min_length 10k;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/javascript application/javascript application/x-javascript;
        gzip_vary on;
        gzip_disable "MSIE [1-6]\.";

	ssl_certificate      cert/newpark.jnwfzx.com_bundle.crt;
	ssl_certificate_key  cert/newpark.jnwfzx.com.key;

    	ssl_protocols TLSv1.2 TLSv1.3;
    	ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
   	ssl_prefer_server_ciphers on;
    	ssl_session_cache shared:SSL:10m;
    	ssl_session_timeout 10m;

        absolute_redirect off;

        location / {
            root /home/newpark/server/middleware/nginx/html/wechatauthfile;
	    index index.html index.htm;
        }

        location /newpark-views {
            root /home/newpark/server/middleware/nginx/html;
            add_header Cache-Control no-store;add_header Pragma no-cache;
            expires 1h;
        }


        location /newparkposapi {
            proxy_pass http://newparkposapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }


        location /newparkplatformapi {
            proxy_pass http://newparkplatformapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /newparkposofflineapi {
            proxy_pass http://newparkposofflineapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }


        location /newpark-merchant/interface/ {
            proxy_pass http://newpark-merchant/newpark-merchant/interface/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
            client_max_body_size 30m;
        }

        location /newpark-merchant/report-interface/ {
            proxy_pass http://newpark-report/newpark-merchant/report-interface/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
            client_max_body_size 30m;
        }

        #缴费平台从merchant服务独立
        location /newpark-merchant/payment-interface/ {
            proxy_pass http://newpark-merchant-payment/newpark-merchant/payment-interface/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
            client_max_body_size 30m;
        }

        location /newpark-portal/interface/ {
            proxy_pass http://newpark-portal/newpark-portal/interface/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
        }
		
        #缴费平台从portal服务独立
        location /newpark-portal-payment/interface/ {
            proxy_pass http://newpark-portal-payment/newpark-portal-payment/interface/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
        }

        location /newpark-provider {
            proxy_pass http://newpark-provider/newpark-provider/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
        }


        location /newpark-merchant-portal {
            proxy_pass http://newpark-merchant-portal/newpark-merchant-portal/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
        }

        location /newpark-unified {
            proxy_pass http://newpark-unified/newpark-unified/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
            client_max_body_size 30m;
        }

        location /newpark-unified-portal {
            proxy_pass http://newpark-unified-portal/newpark-unified-portal/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
        }

        location /newpark-payment {
            proxy_pass http://newpark-payment/newpark-payment/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream off;
            proxy_read_timeout 600s;
        }


        location /newpark-img/ {
            alias /home/newpark/server/sharedir/img/;
            try_files $uri /404.jpg;
            set $width -;
            set $height -;
            if ($arg_w != "") {
                set $width $arg_w;
            }
            if ($arg_h != "") {
                set $height $arg_h;
            }
            expires 1h;
        }


        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }

    server {
        listen       10088;
        server_name 10.10.245.252;
#         server_name  newpark.jnwfzx.com;
        location /newpark-job-admin {
           proxy_pass http://newpark-job-admin;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           add_header Access-Control-Allow-Origin $http_origin;
        }

        location /newpark-manager-view {
            root /home/newpark/server/middleware/nginx/html;
            add_header Cache-Control no-store;add_header Pragma no-cache;
            expires 1h;
        }

        location /newpark-manager {
           proxy_pass http://newpark-manager;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_read_timeout 600s;
           client_max_body_size 30m;
         }
    }


    server {
        listen       9024;
        # server_name  10.10.245.252;
        server_name  newpark.jnwfzx.com;
 
        location = /favicon.ico {
                alias /home/newpark/server/middleware/nginx/conf/favicon.ico;  # 替换为实际的默认图标路径
       	expires 30d;  # 设置缓存头
	access_log off;  # 关闭日志记录
        }
        location / {
            root   /home/mnt/vdb/project/dist;
	    index  index.html index.htm;
        }

        location /h5 {
            alias   /home/mnt/vdb/project/h5/sdumsh5;
            index  index.html index.htm;
        }

        location /ums {
            alias   /home/mnt/vdb/project/h5/umsh5/;
            index  index.html index.htm;
        }

       location ^~ /api {
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_buffering off;
           rewrite ^/api/(.*)$ /$1 break;
           proxy_pass http://gateway;
           #佐¯潔¨彔¯彌~Awebsocket达^彎¥
           proxy_set_header Upgrade $http_upgrade;
           proxy_set_header Connection "upgrade";
           proxy_read_timeout 3600s;
        }

        location /wxminifile {
           alias /home/mnt/vdb/project/projectfile/wxmini/;
           autoindex on;
        }
    }

}



